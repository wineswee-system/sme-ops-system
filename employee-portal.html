<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>員工入口 — SME Ops</title>
<style>
:root {
  --primary: #4f6ef7;
  --primary-light: #e8ecfe;
  --primary-dark: #3b54c4;
  --success: #22c55e;
  --success-light: #dcfce7;
  --warning: #f59e0b;
  --warning-light: #fef3c7;
  --danger: #ef4444;
  --danger-light: #fee2e2;
  --info: #3b82f6;
  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-300: #d1d5db;
  --gray-400: #9ca3af;
  --gray-500: #6b7280;
  --gray-600: #4b5563;
  --gray-700: #374151;
  --gray-800: #1f2937;
  --gray-900: #111827;
  --orange: #f97316;
  --orange-light: #fff7ed;
  --purple: #8b5cf6;
  --purple-light: #ede9fe;
  --radius: 10px;
  --radius-sm: 6px;
  --radius-lg: 14px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 6px rgba(0,0,0,.05), 0 2px 4px rgba(0,0,0,.04);
  --shadow-lg: 0 10px 15px rgba(0,0,0,.08), 0 4px 6px rgba(0,0,0,.04);
  --transition: .2s ease;
  --sidebar-w: 220px;
  --header-h: 56px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans TC', sans-serif;
  background: #f0f2f5; color: var(--gray-800);
  line-height: 1.5; min-height: 100vh;
}
button { font: inherit; cursor: pointer; border: none; background: none; }
input, select, textarea {
  font: inherit; border: 1px solid var(--gray-300); border-radius: var(--radius-sm);
  padding: 8px 12px; width: 100%; outline: none; transition: border var(--transition);
  background: #fff;
}
input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,110,247,.12); }
a { color: var(--primary); text-decoration: none; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--gray-200); font-size: .9rem; }
th { background: var(--gray-50); font-weight: 600; color: var(--gray-600); font-size: .8rem; text-transform: uppercase; letter-spacing: .3px; }
tbody tr:hover { background: var(--gray-50); }
tbody tr:nth-child(even) { background: #fafbfc; }
tbody tr:nth-child(even):hover { background: var(--gray-100); }

/* Header */
.header {
  position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
  background: #fff; border-bottom: 1px solid var(--gray-200);
  display: flex; align-items: center; padding: 0 20px; z-index: 100;
  box-shadow: 0 1px 3px rgba(0,0,0,.04);
}
.header-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1.1rem; color: var(--primary); }
.header-logo svg { width: 28px; height: 28px; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
.header-bell { position: relative; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: background var(--transition); cursor: pointer; }
.header-bell:hover { background: var(--gray-100); }
.header-bell .badge { position: absolute; top: 4px; right: 4px; width: 8px; height: 8px; background: var(--danger); border-radius: 50%; border: 2px solid #fff; }
.header-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--primary-light); color: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: .85rem; cursor: pointer; }
.hamburger { display: none; width: 36px; height: 36px; align-items: center; justify-content: center; border-radius: var(--radius-sm); cursor: pointer; margin-right: 8px; }
.hamburger:hover { background: var(--gray-100); }
.hamburger span { display: block; width: 18px; height: 2px; background: var(--gray-600); position: relative; }
.hamburger span::before, .hamburger span::after { content: ''; position: absolute; left: 0; width: 18px; height: 2px; background: var(--gray-600); }
.hamburger span::before { top: -6px; }
.hamburger span::after { top: 6px; }

/* Sidebar */
.sidebar {
  position: fixed; top: var(--header-h); left: 0; bottom: 0; width: var(--sidebar-w);
  background: #fff; border-right: 1px solid var(--gray-200); overflow-y: auto;
  z-index: 90; transition: transform .25s ease;
  padding: 8px 0;
}
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.3); z-index: 89; }
.nav-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 18px;
  color: var(--gray-600); font-size: .9rem; cursor: pointer;
  transition: all var(--transition); border-radius: 0; margin: 1px 8px; border-radius: var(--radius-sm);
}
.nav-item:hover { background: var(--gray-100); color: var(--gray-800); }
.nav-item.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
.nav-item .nav-icon { width: 20px; text-align: center; font-size: 1rem; flex-shrink: 0; }
.nav-item .nav-label { white-space: nowrap; }
.nav-section { padding: 16px 18px 6px; font-size: .7rem; color: var(--gray-400); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }

/* Main */
.main {
  margin-left: var(--sidebar-w); margin-top: var(--header-h);
  padding: 28px 32px; min-height: calc(100vh - var(--header-h));
}
.main-inner { max-width: 1400px; margin: 0 auto; }

/* Cards */
.card {
  background: #fff; border-radius: var(--radius-lg); box-shadow: var(--shadow);
  padding: 22px; margin-bottom: 20px;
}
.card-title { font-size: 1rem; font-weight: 700; margin-bottom: 14px; color: var(--gray-800); display: flex; align-items: center; gap: 8px; }
.card-title .icon { font-size: 1.1rem; }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 8px 18px; border-radius: var(--radius-sm); font-weight: 600; font-size: .85rem;
  transition: all var(--transition); cursor: pointer; border: none;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover { background: #16a34a; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #dc2626; }
.btn-outline { background: #fff; color: var(--primary); border: 1px solid var(--primary); }
.btn-outline:hover { background: var(--primary-light); }
.btn-sm { padding: 5px 12px; font-size: .8rem; }
.btn-lg { padding: 12px 28px; font-size: 1rem; }

/* Status badges */
.badge-status {
  display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: .75rem; font-weight: 600;
}
.badge-approved { background: var(--success-light); color: #16a34a; }
.badge-pending { background: var(--warning-light); color: #d97706; }
.badge-rejected { background: var(--danger-light); color: var(--danger); }
.badge-info { background: var(--primary-light); color: var(--primary); }

/* Grid */
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

/* Dashboard layout */
.dash-grid { display: grid; grid-template-columns: 1fr 340px; gap: 20px; }

/* Quick action grid */
.quick-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.quick-action-btn {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 6px; padding: 16px 8px; background: var(--gray-50); border-radius: var(--radius);
  cursor: pointer; transition: all var(--transition); border: 1px solid var(--gray-100);
  font-size: .8rem; color: var(--gray-700); font-weight: 500;
}
.quick-action-btn:hover { background: var(--primary-light); border-color: var(--primary); color: var(--primary); transform: translateY(-1px); box-shadow: var(--shadow-md); }
.quick-action-btn .qa-icon { font-size: 1.3rem; }

/* Clock widget */
.clock-display { text-align: center; padding: 16px 0; }
.clock-time { font-size: 2.4rem; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--gray-800); letter-spacing: 1px; }
.clock-date { font-size: .85rem; color: var(--gray-500); margin-top: 2px; }
.clock-btns { display: flex; gap: 10px; margin-top: 14px; }
.clock-btns .btn { flex: 1; padding: 10px; }
.clock-status { margin-top: 10px; font-size: .8rem; color: var(--gray-500); }

/* Calendar */
.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.cal-header h3 { font-size: 1rem; font-weight: 700; }
.cal-nav { display: flex; gap: 6px; }
.cal-nav button { width: 30px; height: 30px; border-radius: var(--radius-sm); background: var(--gray-100); display: flex; align-items: center; justify-content: center; font-size: .9rem; }
.cal-nav button:hover { background: var(--gray-200); }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--gray-200); border-radius: var(--radius); overflow: hidden; }
.cal-day-header { background: var(--gray-50); padding: 8px 4px; text-align: center; font-size: .75rem; font-weight: 600; color: var(--gray-500); }
.cal-day {
  background: #fff; min-height: 70px; padding: 4px 6px; position: relative; cursor: pointer;
  transition: background var(--transition);
}
.cal-day:hover { background: var(--gray-50); }
.cal-day.today { background: var(--primary-light); }
.cal-day.other-month { color: var(--gray-300); }
.cal-day .day-num { font-size: .8rem; font-weight: 600; margin-bottom: 2px; }
.cal-day .shift-tag {
  font-size: .65rem; padding: 1px 5px; border-radius: 3px; display: inline-block;
  font-weight: 500; margin-top: 1px;
}
.shift-morning { background: #dbeafe; color: #1d4ed8; }
.shift-afternoon { background: #fef3c7; color: #b45309; }
.shift-night { background: #ede9fe; color: #6d28d9; }
.shift-off { background: var(--gray-100); color: var(--gray-500); }
.shift-full { background: #dcfce7; color: #16a34a; }

/* Tabs */
.tabs { display: flex; gap: 0; border-bottom: 2px solid var(--gray-200); margin-bottom: 16px; }
.tab-btn {
  padding: 8px 18px; font-size: .85rem; font-weight: 500; color: var(--gray-500);
  cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px;
  transition: all var(--transition);
}
.tab-btn:hover { color: var(--gray-700); }
.tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }

/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4);
  z-index: 200; align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: #fff; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg);
  width: 90%; max-width: 520px; max-height: 85vh; overflow-y: auto; padding: 24px;
}
.modal-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 18px; display: flex; align-items: center; justify-content: space-between; }
.modal-close { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 1.2rem; cursor: pointer; color: var(--gray-400); }
.modal-close:hover { background: var(--gray-100); color: var(--gray-600); }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: .82rem; font-weight: 600; color: var(--gray-600); margin-bottom: 4px; }
.form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

/* Stats row */
.stat-card {
  background: #fff; border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow);
  text-align: center;
}
.stat-value { font-size: 1.6rem; font-weight: 700; color: var(--gray-800); }
.stat-label { font-size: .78rem; color: var(--gray-500); margin-top: 2px; }

/* Contacts mini list */
.contact-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--gray-100); }
.contact-item:last-child { border-bottom: none; }
.contact-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--primary-light); color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: .75rem; font-weight: 600; flex-shrink: 0; }
.contact-name { font-size: .85rem; font-weight: 500; }
.contact-role { font-size: .75rem; color: var(--gray-400); }

/* Reminder list */
.reminder-item { display: flex; align-items: flex-start; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--gray-100); font-size: .83rem; }
.reminder-item:last-child { border-bottom: none; }
.reminder-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 7px; flex-shrink: 0; }

/* Announcement */
.announce-item { padding: 10px 0; border-bottom: 1px solid var(--gray-100); }
.announce-item:last-child { border-bottom: none; }
.announce-tag { font-size: .7rem; padding: 2px 8px; border-radius: 3px; font-weight: 600; margin-right: 6px; }
.announce-title { font-size: .88rem; font-weight: 500; }
.announce-date { font-size: .73rem; color: var(--gray-400); margin-top: 2px; }

/* Flow items */
.flow-list-scroll { max-height: 360px; overflow-y: auto; }
.flow-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--gray-100); }
.flow-item:last-child { border-bottom: none; }
.flow-icon { width: 36px; height: 36px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
.flow-info { flex: 1; min-width: 0; }
.flow-title { font-size: .85rem; font-weight: 600; }
.flow-desc { font-size: .78rem; color: var(--gray-500); }
.flow-status { flex-shrink: 0; }

/* Quick launch row */
.quick-launch { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.quick-launch .btn { font-size: .8rem; padding: 6px 14px; }

/* Off-request calendar */
.off-cal-day { cursor: pointer; }
.off-cal-day.selected { background: var(--primary-light); }
.off-cal-day.selected .day-num { color: var(--primary); font-weight: 700; }

/* Profile info */
.profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.profile-field { margin-bottom: 10px; }
.profile-label { font-size: .78rem; color: var(--gray-400); margin-bottom: 2px; }
.profile-value { font-size: .9rem; font-weight: 500; }

/* Salary breakdown */
.salary-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--gray-100); font-size: .88rem; }
.salary-row:last-child { border-bottom: none; }
.salary-total { font-size: 1.3rem; font-weight: 700; color: var(--primary); }

/* Page title */
.page-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 20px; color: var(--gray-800); }

/* Leave balance cards */
.leave-balances { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.leave-bal-card {
  flex: 1; min-width: 140px; padding: 14px; border-radius: var(--radius); text-align: center;
  border: 1px solid var(--gray-200);
}
.leave-bal-type { font-size: .8rem; color: var(--gray-500); margin-bottom: 4px; }
.leave-bal-num { font-size: 1.5rem; font-weight: 700; }
.leave-bal-total { font-size: .75rem; color: var(--gray-400); }

/* Large clock page */
.big-clock { font-size: 4rem; font-weight: 700; font-variant-numeric: tabular-nums; text-align: center; letter-spacing: 2px; }
.big-date { font-size: 1.1rem; color: var(--gray-500); text-align: center; margin-top: 4px; }

/* Legend */
.legend { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 10px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: .78rem; color: var(--gray-600); }
.legend-color { width: 14px; height: 14px; border-radius: 3px; }

/* Approval chain */
.approval-chain { display: flex; align-items: center; gap: 0; margin-top: 8px; padding: 4px 0; }
.approval-step { display: flex; align-items: center; gap: 4px; font-size: .72rem; color: var(--gray-500); }
.approval-step .step-circle {
  width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: .65rem; font-weight: 600; border: 2px solid var(--gray-300); background: #fff;
}
.approval-step.done .step-circle { background: var(--success); border-color: var(--success); color: #fff; }
.approval-step.current .step-circle { background: var(--warning-light); border-color: var(--warning); color: var(--warning); }
.approval-step.waiting .step-circle { background: var(--gray-100); border-color: var(--gray-300); color: var(--gray-400); }
.approval-connector { width: 20px; height: 2px; background: var(--gray-300); margin: 0 2px; }
.approval-connector.done { background: var(--success); }
.approval-step .step-label { font-size: .68rem; }

/* Contact full list */
.contact-full-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-bottom: 1px solid var(--gray-100); cursor: pointer; border-radius: var(--radius-sm); }
.contact-full-item:hover { background: var(--gray-50); }
.contact-full-item:last-child { border-bottom: none; }
.contact-full-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .9rem; font-weight: 700; flex-shrink: 0; }
.contact-full-info { flex: 1; min-width: 0; }
.contact-full-name { font-size: .9rem; font-weight: 600; }
.contact-full-meta { font-size: .78rem; color: var(--gray-500); }
.contact-full-phone { font-size: .78rem; color: var(--gray-400); flex-shrink: 0; }

/* Outing records */
.outing-record { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--gray-100); }
.outing-record:last-child { border-bottom: none; }
.outing-time { font-size: .85rem; font-weight: 600; color: var(--primary); min-width: 50px; }
.outing-info { flex: 1; }
.outing-reason { font-size: .85rem; font-weight: 500; }
.outing-note { font-size: .78rem; color: var(--gray-400); }

/* Responsive */
@media (max-width: 1024px) {
  .dash-grid { grid-template-columns: 1fr; }
}
@media (max-width: 768px) {
  .hamburger { display: flex; }
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay.open { display: block; }
  .main { margin-left: 0; }
  .dash-grid { grid-template-columns: 1fr; }
  .grid-3 { grid-template-columns: 1fr; }
  .grid-4 { grid-template-columns: 1fr 1fr; }
  .profile-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="hamburger" onclick="toggleSidebar()"><span></span></div>
  <div class="header-logo">
    <svg viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="6" fill="#4f6ef7"/><path d="M7 14h4l3-6 4 12 3-6h4" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    SME Ops
  </div>
  <div class="header-right">

      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>
      <div class="badge"></div>

    <div class="header-avatar" onclick="navigate('/profile')">王</div>

</header>

<!-- Sidebar -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<nav class="sidebar" id="sidebar">

  <div class="nav-item active" data-route="/" onclick="navigate('/')">

  </div>
  <div class="nav-item" data-route="/clock" onclick="navigate('/clock')">
    <span class="nav-icon">&#128336;</span><span class="nav-label">打卡</span>
  </div>
  <div class="nav-item" data-route="/schedule" onclick="navigate('/schedule')">
    <span class="nav-icon">&#128197;</span><span class="nav-label">班表</span>
  </div>
  <div class="nav-item" data-route="/leave" onclick="navigate('/leave')">
    <span class="nav-icon">&#128203;</span><span class="nav-label">請假</span>
  </div>
  <div class="nav-item" data-route="/overtime" onclick="navigate('/overtime')">
    <span class="nav-icon">&#9200;</span><span class="nav-label">加班申請</span>
  </div>
  <div class="nav-item" data-route="/punch" onclick="navigate('/punch')">
    <span class="nav-icon">&#128260;</span><span class="nav-label">補打卡</span>
  </div>
  <div class="nav-item" data-route="/outing" onclick="navigate('/outing')">
    <span class="nav-icon">&#9992;&#65039;</span><span class="nav-label">外出登記</span>
  </div>
  <div class="nav-item" data-route="/salary" onclick="navigate('/salary')">
    <span class="nav-icon">&#128176;</span><span class="nav-label">薪資單</span>
  </div>
  <div class="nav-item" data-route="/expense" onclick="navigate('/expense')">
    <span class="nav-icon">&#128176;</span><span class="nav-label">費用申請</span>
  </div>
  <div class="nav-item" data-route="/attendance" onclick="navigate('/attendance')">
    <span class="nav-icon">&#128202;</span><span class="nav-label">出勤紀錄</span>
  </div>
  <div class="nav-item" data-route="/off-request" onclick="navigate('/off-request')">
    <span class="nav-icon">&#128197;</span><span class="nav-label">希望排休</span>
  </div>

let clockInterval;
function startClock() {
  clearInterval(clockInterval);
  function tick() {
    const el = document.getElementById('liveTime');
    const el2 = document.getElementById('liveDate');
    if (!el) { clearInterval(clockInterval); return; }
    const n = new Date();
    el.textContent = n.toLocaleTimeString('zh-TW', { hour12: false });
    if (el2) {
      const opts = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
      el2.textContent = n.toLocaleDateString('zh-TW', opts);
    }
  }
  tick();
  clockInterval = setInterval(tick, 1000);
}

function statusBadge(s) {
  const map = { approved: ['已核准','badge-approved'], pending: ['待審核','badge-pending'], rejected: ['已退回','badge-rejected'] };
  const [text, cls] = map[s] || ['未知','badge-info'];
  return `<span class="badge-status ${cls}">${text}</span>`;
}

function formatMoney(n) { return n.toLocaleString(); }

function buildCalendar(year, month, scheduleData, isOffSelect) {
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const prevDays = new Date(year, month, 0).getDate();
  const today = new Date();
  const todayDate = today.getDate();
  const todayMonth = today.getMonth();
  const todayYear = today.getFullYear();

  const dayHeaders = ['日','一','二','三','四','五','六'];
  let html = '<div class="cal-grid">';
  dayHeaders.forEach(d => html += `<div class="cal-day-header">${d}</div>`);

  // Previous month days
  for (let i = firstDay - 1; i >= 0; i--) {
    html += `<div class="cal-day other-month"><div class="day-num">${prevDays - i}</div></div>`;
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = (d === todayDate && month === todayMonth && year === todayYear);
    const classes = ['cal-day'];
    if (isToday) classes.push('today');
    if (isOffSelect) {
      classes.push('off-cal-day');
      if (selectedOffDays.has(d)) classes.push('selected');
    }

    let content = `<div class="day-num">${d}</div>`;
    if (scheduleData && scheduleData[d]) {
      const s = SHIFTS[scheduleData[d]];
      if (s) content += `<div class="shift-tag ${s.tag}">${s.label}</div>`;
    }

    const onclick = isOffSelect ? ` onclick="toggleOffDay(${d})"` : '';
    html += `<div class="${classes.join(' ')}"${onclick}>${content}</div>`;
  }

  // Fill remaining cells
  const totalCells = firstDay + daysInMonth;
  const remaining = (7 - totalCells % 7) % 7;
  for (let i = 1; i <= remaining; i++) {
    html += `<div class="cal-day other-month"><div class="day-num">${i}</div></div>`;
  }

  html += '</div>';
  return html;
}

function monthLabel(y, m) {
  return `${y}年${m + 1}月`;
}

function switchDashFlowTab(tab, el) {

function renderFlowList(items) {
  if (!items.length) return '<div style="padding:16px;text-align:center;color:var(--gray-400);font-size:.85rem">暫無資料</div>';
  return items.map(f => {
    let chainHtml = '';
    if (f.approvalChain) {
      chainHtml = '<div class="approval-chain">';
      f.approvalChain.forEach((step, i) => {
        const icon = step.status === 'done' ? '&#10003;' : step.status === 'current' ? '&#9203;' : '&bull;';
        chainHtml += `<div class="approval-step ${step.status}"><div class="step-circle">${icon}</div><span class="step-label">${step.role}</span></div>`;
        if (i < f.approvalChain.length - 1) {
          chainHtml += `<div class="approval-connector ${step.status === 'done' ? 'done' : ''}"></div>`;
        }
      });
      chainHtml += '</div>';
    }
    return `
    <div class="flow-item" style="flex-wrap:wrap">
      <div class="flow-icon" style="background:${f.iconBg}">${f.icon}</div>
      <div class="flow-info">
        <div class="flow-title">${f.title}</div>
        <div class="flow-desc">${f.desc} &middot; ${f.date}</div>
      </div>
      <div class="flow-status">${statusBadge(f.status)}</div>
      ${chainHtml ? `<div style="width:100%;padding-left:48px">${chainHtml}</div>` : ''}
    </div>
  `;
  }).join('');
}

function changeMonth(delta) {
  scheduleMonth += delta;
  if (scheduleMonth > 11) { scheduleMonth = 0; scheduleYear++; }
  if (scheduleMonth < 0) { scheduleMonth = 11; scheduleYear--; }
  render();
}

        <button class="btn btn-outline" onclick="openOTModal()">+ 加班單</button>
        <button class="btn btn-outline" onclick="openPunchModal()">+ 補打卡</button>
        <button class="btn btn-outline" onclick="openExpenseModal()">+ 費用申請</button>
        <button class="btn btn-outline" onclick="openBizTripModal()">+ 出差申請</button>
        <button class="btn btn-outline" onclick="openSwapShiftModal()">+ 換班申請</button>
      </div>
    </div>
    <div class="card">
      <div class="tabs" id="flowTabs">
        <div class="tab-btn ${currentFlowTab==='my'?'active':''}" onclick="switchFlowTab('my',this)">我發起的</div>
        <div class="tab-btn ${currentFlowTab==='assigned'?'active':''}" onclick="switchFlowTab('assigned',this)">指派給我的</div>
      </div>
      <div id="flowContent">
        ${renderFlowList(currentFlowTab === 'my' ? FLOWS_MY : FLOWS_ASSIGNED)}
      </div>
    </div>
  `;
}

function switchFlowTab(tab, el) {
  currentFlowTab = tab;
  document.querySelectorAll('#flowTabs .tab-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  const list = tab === 'my' ? FLOWS_MY : FLOWS_ASSIGNED;
  document.getElementById('flowContent').innerHTML = renderFlowList(list);
}

// ========== CONTACTS PAGE ==========
let contactSearch = '';
let contactDeptFilter = '';

function renderContacts() {
  const depts = [...new Set(CONTACTS_FULL.map(c => c.dept))];
  let filtered = CONTACTS_FULL;
  if (contactSearch) {
    const q = contactSearch.toLowerCase();
    filtered = filtered.filter(c => c.name.toLowerCase().includes(q) || c.position.toLowerCase().includes(q) || c.dept.toLowerCase().includes(q));
  }
  if (contactDeptFilter) {
    filtered = filtered.filter(c => c.dept === contactDeptFilter);
  }

  return `
    <div class="page-title">&#128101; 通訊錄</div>
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <div style="flex:1;min-width:200px"><input type="text" placeholder="搜尋姓名、職位、部門..." value="${contactSearch}" oninput="contactSearch=this.value;document.getElementById('app').innerHTML=renderContacts()"></div>
        <div style="min-width:150px"><select onchange="contactDeptFilter=this.value;document.getElementById('app').innerHTML=renderContacts()"><option value="">全部部門</option>${depts.map(d => `<option ${contactDeptFilter===d?'selected':''}>${d}</option>`).join('')}</select></div>
      </div>
    </div>
    <div class="card">
      ${filtered.length === 0 ? '<div style="padding:16px;text-align:center;color:var(--gray-400);font-size:.85rem">找不到符合的聯絡人</div>' :
        filtered.map((c, i) => `
          <div class="contact-full-item" onclick="openContactDetail(${CONTACTS_FULL.indexOf(c)})">
            <div class="contact-full-avatar" style="background:${c.avatarBg};color:${c.avatarColor}">${c.initials}</div>
            <div class="contact-full-info">
              <div class="contact-full-name">${c.name}</div>
              <div class="contact-full-meta">${c.position} &middot; ${c.dept} &middot; ${c.store}</div>
            </div>
            <div class="contact-full-phone">&#128222; ${c.phone}</div>
          </div>
        `).join('')}
    </div>
  `;
}

function openContactDetail(index) {
  const c = CONTACTS_FULL[index];
  openModal(`
    <div class="modal-title">
      <span>聯絡人資訊</span>
      <span class="modal-close" onclick="closeModal()">&times;</span>
    </div>
    <div style="text-align:center;margin-bottom:18px">
      <div style="width:64px;height:64px;border-radius:50%;background:${c.avatarBg};color:${c.avatarColor};display:inline-flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:700;margin-bottom:8px">${c.initials}</div>
      <div style="font-size:1.1rem;font-weight:700">${c.name}</div>
      <div style="font-size:.85rem;color:var(--gray-500)">${c.position}</div>

    <div class="form-actions"><button class="btn btn-outline" onclick="closeModal()">關閉</button></div>
  `);
}
